name: PR Notifications

on:
  pull_request:
    types: [opened, reopened, closed, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  notify:
    name: Send PR Notification
    runs-on: ubuntu-latest
    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "PR #${{ github.event.pull_request.number }} ${{ github.event.action }} - ${{ github.repository }}"
          to: pr@lmcustoms.cc
          from: GitHub Actions <noreply@lmcustoms.cc>
          body: |
            Pull Request: #${{ github.event.pull_request.number }}
            Title: ${{ github.event.pull_request.title }}
            Action: ${{ github.event.action }}
            Author: ${{ github.event.pull_request.user.login }}
            Repository: ${{ github.repository }}
            
            ${{ github.event.pull_request.body }}
            
            View PR: ${{ github.event.pull_request.html_url }}
