name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            # Sync docker-compose.yml from repo
            curl -fsSL https://raw.githubusercontent.com/WingsOfCobra/neo-dock/main/docker-compose.yml -o docker-compose.yml.new
            mv docker-compose.yml.new docker-compose.yml
            # Deploy
            docker compose pull
            docker compose down
            docker compose up -d

            # ── Smoke test ───────────────────────────────────────────────────
            # Wait for the container to be ready (up to 2 min)
            echo "Waiting for neo-dock to come up..."
            for i in $(seq 1 24); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4445/api/auth/check 2>/dev/null || echo "000")
              if [ "$STATUS" != "000" ]; then
                echo "App responding (HTTP $STATUS)"
                break
              fi
              echo "  attempt $i/24..."
              sleep 5
            done

            # Validate response: unauthenticated request must return 401 (not 500 or 000)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4445/api/auth/check 2>/dev/null || echo "000")
            case "$STATUS" in
              401|403)
                echo "✓ Smoke test passed — auth check returned $STATUS (unauthenticated as expected)"
                ;;
              200)
                echo "✓ Smoke test passed — auth check returned 200 (cookie still valid)"
                ;;
              000)
                echo "✗ Smoke test FAILED — app not reachable after 2 minutes"
                docker compose logs --tail=50
                exit 1
                ;;
              *)
                echo "✗ Smoke test FAILED — unexpected HTTP $STATUS"
                docker compose logs --tail=50
                exit 1
                ;;
            esac
