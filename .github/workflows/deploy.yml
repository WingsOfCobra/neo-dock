name: Deploy

on:
  workflow_run:
    workflows: ["Build & Push Docker Image"]
    types:
      - completed

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            # Sync docker-compose.yml from repo
            curl -fsSL https://raw.githubusercontent.com/WingsOfCobra/neo-dock/main/docker-compose.yml -o docker-compose.yml.new
            mv docker-compose.yml.new docker-compose.yml
            # Deploy
            docker compose pull
            docker compose down
            docker compose up -d

  deploy-zartmann:
    name: Deploy chef-node to zartmann
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy chef-node via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 89.58.37.253
          username: cobra
          key: ${{ secrets.ZARTMANN_SSH_KEY }}
          script: |
            cd ~/chef-api
            docker compose pull
            docker compose down
            docker compose up -d
            echo "chef-node deployed to zartmann"

  deploy-schrombus:
    name: Deploy chef-node to schrombus
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy chef-node via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 89.58.44.64
          username: cobra
          key: ${{ secrets.SCHROMBUS_SSH_KEY }}
          script: |
            cd ~/chef-api
            docker compose pull
            docker compose down
            docker compose up -d
            echo "chef-node deployed to schrombus"
