services:
  neo-dock:
    image: ghcr.io/wingsofcobra/neo-dock:latest
    container_name: neo-dock
    restart: unless-stopped
    ports:
      - "${NEO_DOCK_PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - neo-dock-data:/app/data
    networks:
      - solcloud
      - monitoring_monitoring

volumes:
  neo-dock-data:

networks:
  solcloud:
    name: solcloud
    external: true
  monitoring_monitoring:
    name: monitoring_monitoring
    external: true
